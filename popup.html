<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradutor MSA Extensão</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="icon" href="440x280_Tradutor.png">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="header-top">
        <div class="logo-area">
          <h1>Tradutor MSA</h1>
          <p class="subtitle">Leve, prático e transparente</p>
        </div>
        <button id="supportBtn" class="icon-btn-sm" type="button" title="Ajuda e suporte" aria-label="Ajuda e suporte">?</button>
      </div>

      <nav class="tabs" aria-label="Navegação principal">
        <button class="tab-btn active" data-tab="translator" type="button" aria-controls="translator-view" aria-selected="true">Tradução</button>
        <button class="tab-btn" data-tab="history" type="button" aria-controls="history-view" aria-selected="false">Histórico</button>
      </nav>
    </header>

    <div id="reviewBanner" class="review-banner" hidden>
      <p>Está ajudando no seu dia a dia? Deixe uma avaliação na loja.</p>
      <div class="review-actions">
        <button id="rateBtn" class="rate-btn" type="button">Avaliar</button>
        <button id="closeRateBtn" class="close-rate-btn" type="button">Agora não</button>
      </div>
    </div>

    <main id="translator-view" class="view active" aria-label="Tradutor">
      <div class="language-selector">
        <div class="select-group">
          <label for="sourceLang" class="sr-only">Idioma de origem</label>
          <select id="sourceLang"></select>
        </div>
        <button id="swapLanguages" class="icon-btn" type="button" title="Inverter idiomas" aria-label="Inverter idiomas">↔</button>
        <div class="select-group">
          <label for="targetLang" class="sr-only">Idioma de destino</label>
          <select id="targetLang"></select>
        </div>
      </div>

      <div class="textarea-container">
        <label for="sourceText" class="sr-only">Texto original</label>
        <textarea id="sourceText" maxlength="5000" placeholder="Digite, cole ou dite o texto que deseja traduzir."></textarea>
        <div class="tools">
          <button id="micBtn" class="tool-btn" type="button" title="Ditado por voz" aria-label="Ditado por voz">🎤</button>
          <button id="copySourceBtn" class="tool-btn" type="button" title="Copiar texto original" aria-label="Copiar texto original">📋</button>
        </div>
      </div>

      <div class="textarea-container">
        <label for="targetText" class="sr-only">Texto traduzido</label>
        <textarea id="targetText" readonly placeholder="A tradução aparecerá aqui."></textarea>
        <div class="tools">
          <label for="voiceSelect" class="sr-only">Selecionar voz</label>
          <select id="voiceSelect" class="voice-select" title="Selecionar voz de leitura">
            <option value="">Voz padrão</option>
          </select>
          <button id="speakBtn" class="tool-btn" type="button" title="Ler tradução em voz alta" aria-label="Ler tradução em voz alta">🔊</button>
          <button id="copyTargetBtn" class="tool-btn" type="button" title="Copiar tradução" aria-label="Copiar tradução">📋</button>
        </div>
      </div>

      <div class="action-bar">
        <button id="translateBtn" class="primary-btn" type="button">Traduzir</button>
      </div>
      <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      <p id="privacyHint" class="privacy-hint">Aviso: o texto enviado para tradução é processado pela MyMemory API.</p>
    </main>

    <main id="history-view" class="view" aria-label="Histórico">
      <div class="history-header">
        <h2>Recentes</h2>
        <button id="clearHistoryBtn" class="text-btn" type="button">Limpar histórico</button>
      </div>
      <ul id="historyList" class="history-list">
        <li class="empty-state">Ainda não há traduções salvas.</li>
      </ul>
    </main>
  </div>

  <script src="languages.js"></script>
  <script src="popup.js"></script>
</body>
</html>
