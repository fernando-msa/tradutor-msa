name: Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: |
          node --check background.js
          node --check popup.js
          node --check permission.js
          node --check languages.js

      - name: Run basic lint
        run: node scripts/lint.mjs

      - name: Run contract tests
        run: node --test tests/extension-contract.test.js
